name: CI Pipeline

# Triggers on every commit pushed to a PR targeting develop, staging, or main.
# "synchronize" fires on each new commit to an open PR.
on:
  pull_request:
    branches: [develop, staging, main]
    types: [opened, synchronize, reopened]

# Cancel an in-progress run for the same PR when a new commit arrives.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # needed to post/update the CI result comment

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — TypeScript strict type-check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict type-check
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Full test suite + 70 % coverage gate
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage Gate (≥70%)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # @vitest/coverage-v8 must be present for coverage collection.
      # If it is already in package.json this step is a no-op.
      # If not, it is installed ephemerally so the CI run works immediately.
      # To make this permanent: npm install -D @vitest/coverage-v8 && commit.
      - name: Ensure coverage provider (@vitest/coverage-v8)
        run: npm list @vitest/coverage-v8 2>/dev/null || npm install -D @vitest/coverage-v8

      # Run the full test suite with coverage.
      # continue-on-error keeps the job alive so we can still read the
      # coverage report and post a detailed PR comment even on test failure.
      - name: Run tests with coverage
        id: tests
        run: |
          npm run test -- \
            --coverage \
            --reporter=verbose
        continue-on-error: true

      # Parse coverage/coverage-summary.json (produced by the json-summary
      # reporter configured in vitest.config.ts) and check each metric
      # against the 70 % threshold.
      - name: Evaluate coverage thresholds
        id: coverage
        if: always()
        shell: bash
        run: |
          SUMMARY="coverage/coverage-summary.json"
          THRESHOLD=70

          if [ ! -f "$SUMMARY" ]; then
            echo "status=no-report" >> "$GITHUB_OUTPUT"
            echo "::warning::Coverage report was not generated. Tests may have crashed before completion."
            exit 0
          fi

          LINES=$(node -p "require('./${SUMMARY}').total.lines.pct")
          FUNCTIONS=$(node -p "require('./${SUMMARY}').total.functions.pct")
          BRANCHES=$(node -p "require('./${SUMMARY}').total.branches.pct")
          STATEMENTS=$(node -p "require('./${SUMMARY}').total.statements.pct")

          echo "lines=${LINES}"           >> "$GITHUB_OUTPUT"
          echo "functions=${FUNCTIONS}"   >> "$GITHUB_OUTPUT"
          echo "branches=${BRANCHES}"     >> "$GITHUB_OUTPUT"
          echo "statements=${STATEMENTS}" >> "$GITHUB_OUTPUT"

          FAILED=false
          node -e "if(${LINES}      < ${THRESHOLD}) process.exit(1)" || { echo "::warning::Lines coverage: ${LINES}% (required ≥ ${THRESHOLD}%)"; FAILED=true; }
          node -e "if(${FUNCTIONS}  < ${THRESHOLD}) process.exit(1)" || { echo "::warning::Functions coverage: ${FUNCTIONS}% (required ≥ ${THRESHOLD}%)"; FAILED=true; }
          node -e "if(${BRANCHES}   < ${THRESHOLD}) process.exit(1)" || { echo "::warning::Branches coverage: ${BRANCHES}% (required ≥ ${THRESHOLD}%)"; FAILED=true; }
          node -e "if(${STATEMENTS} < ${THRESHOLD}) process.exit(1)" || { echo "::warning::Statements coverage: ${STATEMENTS}% (required ≥ ${THRESHOLD}%)"; FAILED=true; }

          if [ "$FAILED" = "true" ]; then
            echo "status=below-threshold" >> "$GITHUB_OUTPUT"
          else
            echo "status=passed"          >> "$GITHUB_OUTPUT"
          fi

      # Create or update (idempotent) a single CI-bot comment on the PR.
      # The hidden MARKER lets us find and replace the comment on re-runs
      # instead of spamming new ones.
      - name: Post CI result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MARKER       = '<!-- quantum-bunker-ci-bot -->';
            const testOutcome  = '${{ steps.tests.outcome }}';
            const covStatus    = '${{ steps.coverage.outputs.status }}';

            const testsFailed  = testOutcome === 'failure';
            const coverageLow  = covStatus   === 'below-threshold';
            const noReport     = covStatus   === 'no-report';
            const allGreen     = !testsFailed && !coverageLow && !noReport;

            const parse = (s) => Number.isFinite(parseFloat(s)) ? parseFloat(s) : null;
            const lines      = parse('${{ steps.coverage.outputs.lines }}');
            const functions  = parse('${{ steps.coverage.outputs.functions }}');
            const branches   = parse('${{ steps.coverage.outputs.branches }}');
            const statements = parse('${{ steps.coverage.outputs.statements }}');

            const pct  = (v) => v !== null ? `${v.toFixed(1)}%` : 'N/A';
            const icon = (v) => (v !== null && v >= 70) ? '✅' : '❌';

            const coverageTable = (lines !== null)
              ? [
                  '| Metric     | Coverage         | Threshold | Status |',
                  '|------------|------------------|-----------|--------|',
                   `| Lines      | ${pct(lines)}     | 70%       | ${icon(lines)} |`,
                   `| Functions  | ${pct(functions)} | 70%       | ${icon(functions)} |`,
                   `| Branches   | ${pct(branches)}  | 70%       | ${icon(branches)} |`,
                   `| Statements | ${pct(statements)}| 70%       | ${icon(statements)} |`,
                ].join('\n')
              : '_Coverage data was not generated (tests crashed before collecting coverage)._';

            let body;
            if (allGreen) {
              body = [
                MARKER,
                '## ✅ CI Pipeline Passed',
                '',
                'All tests passed and every coverage metric meets the **≥ 70% threshold**.',
                '',
                '### Coverage Report',
                '',
                coverageTable,
              ].join('\n');
            } else {
              const reasons = [];
              if (testsFailed) reasons.push('one or more **tests failed**');
              if (coverageLow) reasons.push('**coverage is below 70%** on one or more metrics');
              if (noReport)    reasons.push('the **coverage report was not generated** — tests may have crashed');

              body = [
                MARKER,
                '## ❌ PR Blocked — CI Rejected',
                '',
                `This PR is blocked because ${reasons.join(' and ')}.`,
                '',
                '### Coverage Report',
                '',
                coverageTable,
                '',
                '### How to unblock',
                '1. Fix all failing tests.',
                '2. Ensure **lines, functions, branches, and statements** are each **≥ 70%**.',
                '3. Push a new commit — the pipeline re-runs automatically.',
                '',
                `_Run \`${"`"}npm run test -- --coverage${"`"}\` locally to check coverage before pushing._`,
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Hard-fail the job only when tests actually fail.
      # Coverage is reported as a PR comment but never blocks the merge.
      - name: Enforce CI gate
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Tests failed — check the PR comment for details."
          exit 1
